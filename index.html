<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>몽냥 — 디자인 시안</title>
<style>
/* ============================================================
   Wanted Design System — Foundation tokens
   Source: Wanted Design System Figma file (CC BY 4.0 community)
   Two-layer model:
     - Atomic palette (raw hues + neutrals + opacity scale)
     - Semantic tokens (label / background / line / interaction / status / accent)
   Typography: Pretendard JP — a Korean / English / Japanese sans family.
   ============================================================ */

/* ---- Webfonts ---------------------------------------------- */
/* Pretendard Variable is shipped locally with the design system
   (fonts/PretendardVariable.ttf). This is the standard subset —
   it covers Korean + Latin glyphs at every weight 100–900.
   The original Wanted brand uses "Pretendard JP" (same family,
   adds Japanese glyphs); load it from CDN if you need JP copy.
   Wanted Sans (display) is the secondary face for the wordmark. */
@font-face {
  font-family: "Pretendard Variable";
  src: url("./fonts/PretendardVariable.ttf") format("truetype-variations"),
       url("./fonts/PretendardVariable.ttf") format("truetype");
  font-weight: 100 900;
  font-style: normal;
  font-display: swap;
}
/* Optional: Pretendard JP (CDN) — adds Japanese glyph coverage */
@import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-jp.css");
@import url("https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@v1.0.4/packages/wanted-sans/fonts/webfonts/variable/complete/WantedSansVariable.min.css");

:root {
  /* ─────────────────────────────────────────────────────────
     ATOMIC — raw palette. 13 hues, each with steps 99→0
     plus a common pair and a neutral scale.
     Names mirror Figma tokens exactly: color-atomic-{hue}-{step}.
     ───────────────────────────────────────────────────────── */

  /* common — pure black/white */
  --color-atomic-common-100: #ffffff;
  --color-atomic-common-0:   #000000;

  /* neutral (warm gray scale, default 5 steps, 16 stops) */
  --color-atomic-neutral-99: #F7F7F7;
  --color-atomic-neutral-96: #DCDCDC;
  --color-atomic-neutral-90: #C4C4C4;
  --color-atomic-neutral-80: #B0B0B0;
  --color-atomic-neutral-70: #9B9B9B;
  --color-atomic-neutral-60: #8A8A8A;
  --color-atomic-neutral-50: #737373;
  --color-atomic-neutral-40: #5C5C5C;
  --color-atomic-neutral-30: #474747;
  --color-atomic-neutral-25: #303030;
  --color-atomic-neutral-22: #2A2A2A;
  --color-atomic-neutral-15: #1C1C1C;
  --color-atomic-neutral-12: #171717;
  --color-atomic-neutral-8:  #0F0F0F;

  /* slate — blue-tinted gray */
  --color-atomic-slate-50:  #F8FAFC;
  --color-atomic-slate-100: #F1F5F9;
  --color-atomic-slate-200: #E2E8F0;
  --color-atomic-slate-300: #CBD5E1;
  --color-atomic-slate-400: #94A3B8;
  --color-atomic-slate-500: #64748B;
  --color-atomic-slate-600: #475569;
  --color-atomic-slate-700: #334155;
  --color-atomic-slate-800: #1E293B;
  --color-atomic-slate-900: #0F172A;

  /* gray — true neutral gray */
  --color-atomic-gray-50:  #F9FAFB;
  --color-atomic-gray-100: #F3F4F6;
  --color-atomic-gray-200: #E5E7EB;
  --color-atomic-gray-300: #D1D5DB;
  --color-atomic-gray-400: #9CA3AF;
  --color-atomic-gray-500: #6B7280;
  --color-atomic-gray-600: #4B5563;
  --color-atomic-gray-700: #374151;
  --color-atomic-gray-800: #1F2937;
  --color-atomic-gray-900: #111827;

  /* zinc — cool neutral gray */
  --color-atomic-zinc-50:  #FAFAFA;
  --color-atomic-zinc-100: #F4F4F5;
  --color-atomic-zinc-200: #E4E4E7;
  --color-atomic-zinc-300: #D4D4D8;
  --color-atomic-zinc-400: #A1A1AA;
  --color-atomic-zinc-500: #71717A;
  --color-atomic-zinc-600: #52525B;
  --color-atomic-zinc-700: #3F3F46;
  --color-atomic-zinc-800: #27272A;
  --color-atomic-zinc-900: #18181B;

  /* red — destructive / error */
  --color-atomic-red-99: #FFFAFA;
  --color-atomic-red-96: #FEECEC;
  --color-atomic-red-90: #FED5D5;
  --color-atomic-red-80: #FFB5B5;
  --color-atomic-red-70: #FF8C8C;
  --color-atomic-red-60: #FF6363;
  --color-atomic-red-50: #FF4242;
  --color-atomic-red-40: #E52222;
  --color-atomic-red-25: #B20C0C;
  --color-atomic-red-15: #750404;
  --color-atomic-red-5:  #3B0101;

  /* rose */
  --color-atomic-rose-50:  #FFF5F6;
  --color-atomic-rose-100: #FFE4E6;
  --color-atomic-rose-200: #FECDD3;
  --color-atomic-rose-300: #FDA4AF;
  --color-atomic-rose-400: #FB7185;
  --color-atomic-rose-500: #F43F5E;
  --color-atomic-rose-600: #E11D48;
  --color-atomic-rose-700: #BE123C;
  --color-atomic-rose-800: #9F1239;
  --color-atomic-rose-900: #7B1133;

  /* coral */
  --color-atomic-coral-99: #FFFAF7;
  --color-atomic-coral-96: #FEEEE5;
  --color-atomic-coral-90: #FEDBC6;
  --color-atomic-coral-80: #FFC09C;
  --color-atomic-coral-70: #FF9C63;
  --color-atomic-coral-60: #FF7B2E;
  --color-atomic-coral-50: #FF5E00;
  --color-atomic-coral-48: #F55A00;
  --color-atomic-coral-40: #CC4B00;
  --color-atomic-coral-30: #943600;
  --color-atomic-coral-15: #5C2200;
  --color-atomic-coral-5:  #2E1100;

  /* orange — warning */
  --color-atomic-orange-99: #FFFCF7;
  --color-atomic-orange-96: #FEF4E6;
  --color-atomic-orange-90: #FEE6C6;
  --color-atomic-orange-80: #FFD49C;
  --color-atomic-orange-70: #FFC06E;
  --color-atomic-orange-60: #FFA938;
  --color-atomic-orange-50: #FF9200;
  --color-atomic-orange-45: #D47800;
  --color-atomic-orange-40: #D17600;
  --color-atomic-orange-30: #9C5800;
  --color-atomic-orange-15: #663A00;
  --color-atomic-orange-5:  #361E00;

  /* yellow */
  --color-atomic-yellow-50:  #FEFEF3;
  --color-atomic-yellow-100: #FEF9C3;
  --color-atomic-yellow-200: #FEF08A;
  --color-atomic-yellow-300: #FDE047;
  --color-atomic-yellow-400: #FACC15;
  --color-atomic-yellow-500: #EAB308;
  --color-atomic-yellow-600: #CA8A04;
  --color-atomic-yellow-700: #A16207;
  --color-atomic-yellow-800: #854D0E;
  --color-atomic-yellow-900: #60360F;

  /* lime — fresh accent */
  --color-atomic-lime-99: #F8FFF2;
  --color-atomic-lime-95: #E6FFD4;
  --color-atomic-lime-90: #CCFCA9;
  --color-atomic-lime-80: #AEF779;
  --color-atomic-lime-70: #88F03E;
  --color-atomic-lime-60: #6BE016;
  --color-atomic-lime-50: #58CF04;
  --color-atomic-lime-40: #48AD00;
  --color-atomic-lime-37: #429E00;
  --color-atomic-lime-30: #347D00;
  --color-atomic-lime-15: #225200;
  --color-atomic-lime-5:  #112900;

  /* green — success / positive */
  --color-atomic-green-99: #F2FFF6;
  --color-atomic-green-95: #D9FFE6;
  --color-atomic-green-90: #ACFCC7;
  --color-atomic-green-80: #7DF5A5;
  --color-atomic-green-70: #49E57D;
  --color-atomic-green-60: #1ED45A;
  --color-atomic-green-50: #00BF40;
  --color-atomic-green-40: #009632;
  --color-atomic-green-30: #006E25;
  --color-atomic-green-15: #004517;
  --color-atomic-green-5:  #00240C;

  /* cyan */
  --color-atomic-cyan-99: #F7FEFF;
  --color-atomic-cyan-95: #DEFAFF;
  --color-atomic-cyan-90: #B5F4FF;
  --color-atomic-cyan-80: #8AEDFF;
  --color-atomic-cyan-70: #57DFF7;
  --color-atomic-cyan-60: #28D0ED;
  --color-atomic-cyan-50: #00BDDE;
  --color-atomic-cyan-40: #0098B2;
  --color-atomic-cyan-25: #006F82;
  --color-atomic-cyan-15: #004854;
  --color-atomic-cyan-5:  #00252B;

  /* blue — primary brand color */
  --color-atomic-blue-99: #F7FBFF;
  --color-atomic-blue-96: #EAF2FE;
  --color-atomic-blue-90: #C9DEFE;
  --color-atomic-blue-80: #9EC5FF;
  --color-atomic-blue-70: #69A5FF;
  --color-atomic-blue-60: #4F95FF;
  --color-atomic-blue-55: #3385FF;
  --color-atomic-blue-50: #1A75FF;
  --color-atomic-blue-45: #0066FF;   /* PRIMARY */
  --color-atomic-blue-40: #005EEB;
  --color-atomic-blue-35: #0054D1;
  --color-atomic-blue-25: #003E9C;
  --color-atomic-blue-15: #002966;
  --color-atomic-blue-5:  #001536;

  /* violet — secondary brand accent */
  --color-atomic-violet-99: #FBFAFF;
  --color-atomic-violet-96: #F0ECFE;
  --color-atomic-violet-90: #DBD3FE;
  --color-atomic-violet-80: #C0B0FF;
  --color-atomic-violet-70: #9E86FC;
  --color-atomic-violet-60: #7D5EF7;
  --color-atomic-violet-50: #6541F2;
  --color-atomic-violet-48: #5B37ED;
  --color-atomic-violet-45: #4F29E5;
  --color-atomic-violet-35: #3A16C9;
  --color-atomic-violet-25: #23098F;
  --color-atomic-violet-15: #11024D;

  /* purple */
  --color-atomic-purple-99: #FEFBFF;
  --color-atomic-purple-95: #F9EDFF;
  --color-atomic-purple-90: #F2D6FF;
  --color-atomic-purple-80: #E9BAFF;
  --color-atomic-purple-70: #DE96FF;
  --color-atomic-purple-60: #D478FF;
  --color-atomic-purple-50: #CB59FF;
  --color-atomic-purple-40: #AD36E3;
  --color-atomic-purple-30: #861CB8;
  --color-atomic-purple-15: #580A7D;
  --color-atomic-purple-5:  #290247;

  /* pink */
  --color-atomic-pink-99: #FFFAFE;
  --color-atomic-pink-96: #FEECFB;
  --color-atomic-pink-90: #FED3F7;
  --color-atomic-pink-80: #FFB8F3;
  --color-atomic-pink-70: #FF94ED;
  --color-atomic-pink-60: #FA73E3;
  --color-atomic-pink-50: #F553DA;
  --color-atomic-pink-46: #E846CD;
  --color-atomic-pink-40: #D331B8;
  --color-atomic-pink-30: #A81690;
  --color-atomic-pink-15: #730560;
  --color-atomic-pink-5:  #3D0133;

  /* ─────────────────────────────────────────────────────────
     RADII, SPACING, SHADOWS
     ───────────────────────────────────────────────────────── */
  --radius-2:  2px;
  --radius-4:  4px;
  --radius-6:  6px;
  --radius-8:  8px;
  --radius-10: 10px;
  --radius-12: 12px;
  --radius-16: 16px;   /* small cards, pill buttons */
  --radius-20: 20px;
  --radius-24: 24px;   /* default card */
  --radius-32: 32px;   /* large container */
  --radius-64: 64px;   /* hero / section */
  --radius-pill: 999px;

  /* spacing — multiples of 4, with named anchors */
  --space-2:  2px;
  --space-4:  4px;
  --space-6:  6px;
  --space-8:  8px;
  --space-12: 12px;
  --space-16: 16px;
  --space-20: 20px;
  --space-24: 24px;
  --space-32: 32px;
  --space-48: 48px;
  --space-64: 64px;
  --space-96: 96px;
  --space-128: 128px;

  /* shadow system — used on elevated cards, popovers, toasts */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06), 0 1px 1px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.08), 0 1px 2px rgba(0, 0, 0, 0.06);
  --shadow-lg: 0 4px 16px rgba(23, 23, 23, 0.07), 0 2px 4px rgba(23, 23, 23, 0.06);
  --shadow-xl: 0 8px 32px rgba(23, 23, 23, 0.10), 0 4px 8px rgba(23, 23, 23, 0.07);
  --shadow-focus-ring: 0 0 0 4px rgba(0, 102, 255, 0.16);

  /* ─────────────────────────────────────────────────────────
     TYPOGRAPHY — Pretendard JP, 16-step type scale.
     Tokens named Display / Title / Heading / Body / Label / Caption.
     Letter-spacing values come from the Figma source; they tighten
     as type grows. Body uses positive tracking for readability.
     ───────────────────────────────────────────────────────── */
  --font-sans: "Pretendard Variable", "Pretendard JP", "Pretendard", -apple-system, BlinkMacSystemFont,
               system-ui, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
  --font-display: "Wanted Sans Variable", "Pretendard Variable", "Pretendard JP", var(--font-sans);
  --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;

  /* Display — used for hero numbers, splash titles */
  --display-1-size: 56px;  --display-1-lh: 1.250; --display-1-tracking: -0.0166em; --display-1-weight: 700;
  --display-2-size: 40px;  --display-2-lh: 1.300; --display-2-tracking: -0.0282em; --display-2-weight: 700;
  --display-3-size: 32px;  --display-3-lh: 1.300; --display-3-tracking: -0.0263em; --display-3-weight: 700;

  /* Title — section/article titles */
  --title-1-size: 32px;    --title-1-lh: 1.375; --title-1-tracking: -0.0253em; --title-1-weight: 700;
  --title-2-size: 28px;    --title-2-lh: 1.358; --title-2-tracking: -0.0236em; --title-2-weight: 700;
  --title-3-size: 24px;    --title-3-lh: 1.334; --title-3-tracking: -0.0226em; --title-3-weight: 700;

  /* Heading — block-level headings, lists, cards */
  --heading-1-size: 22px;  --heading-1-lh: 1.364; --heading-1-tracking: -0.0194em; --heading-1-weight: 700;
  --heading-2-size: 20px;  --heading-2-lh: 1.400; --heading-2-tracking: -0.0120em; --heading-2-weight: 600;

  /* Body — paragraph text. Two density variants per size:
     ".normal" for dense UI rows / ".reading" for long-form prose */
  --body-1-size: 16px;     --body-1-normal-lh: 1.500;  --body-1-reading-lh: 1.625; --body-1-tracking: 0.0057em; --body-1-weight: 500;
  --body-2-size: 15px;     --body-2-normal-lh: 1.467;  --body-2-reading-lh: 1.600; --body-2-tracking: 0.0096em; --body-2-weight: 500;

  /* Label — buttons, form labels, captions in cards */
  --label-1-size: 14px;    --label-1-normal-lh: 1.429; --label-1-reading-lh: 1.571; --label-1-tracking: 0.0145em; --label-1-weight: 500;
  --label-2-size: 13px;    --label-2-lh: 1.385; --label-2-tracking: 0.0194em; --label-2-weight: 500;

  /* Caption — fine print, timestamps */
  --caption-1-size: 12px;  --caption-1-lh: 1.334; --caption-1-tracking: 0.0252em; --caption-1-weight: 500;
  --caption-2-size: 11px;  --caption-2-lh: 1.273; --caption-2-tracking: 0.0311em; --caption-2-weight: 500;
}

/* ─────────────────────────────────────────────────────────
   몽냥 Design Tokens — 실제 디자인 화면에서 사용하는 색상
   ───────────────────────────────────────────────────────── */
:root {
  /* Brand */
  --color-brand-primary:          var(--color-atomic-coral-60);
  --color-brand-subtle:          var(--color-atomic-coral-96);
  --color-brand-accent:         var(--color-atomic-coral-30);

  /* Text */
  --color-text-strong:            var(--color-atomic-common-0);        /* #000000 */
  --color-text-default:           #27272A;                             /* Zinc-800 */
  --color-text-subtle:            var(--color-atomic-neutral-70);      /* #9B9B9B */
  --color-text-placeholder:       #D4D4D8;                             /* Zinc-300 */
  --color-text-disabled:          #E4E4E7;                             /* Zinc-200 */

  /* Icon */
  --color-icon-default:           var(--color-atomic-neutral-70);      /* #9B9B9B */

  /* Background */
  --color-bg-default:             var(--color-atomic-common-100);      /* #FFFFFF */
  --color-bg-subtle:              var(--color-atomic-neutral-99);      /* #F7F7F7 */
  --color-bg-muted:               #F4F4F5;                             /* Neutral 98 */
  --color-surface-default:        #E4E4E7;                             /* Zinc-200 */
  --color-surface-track:          #D4D4D8;                             /* Zinc-300 */

  /* Border */
  --color-border-default:         #E4E4E7;                             /* Zinc-200 */
  --color-border-subtle:          #E4E4E7;                             /* Zinc-200 */
  --color-border-strong:          #D4D4D8;                             /* Zinc-300 */

  /* Status */
  --color-status-info:            var(--color-atomic-blue-45);         /* #0066FF */
  --color-status-error:           var(--color-atomic-red-50);          /* #FF4242 */
  --color-status-success:         var(--color-atomic-green-50);        /* #00BF40 */
  --color-status-warning:         var(--color-atomic-orange-60);       /* #FFA938 */

  /* Social */
  --color-social-kakao:           #FEE500;
  --color-social-naver:           #03C75A;
  --color-social-google:          var(--color-atomic-common-100);      /* #FFFFFF */
  --color-social-apple:           var(--color-atomic-common-0);        /* #000000 */

  /* Gender */
  --color-gender-male:            var(--color-atomic-blue-70);         /* #69A5FF */
  --color-gender-male-surface:    var(--color-atomic-blue-96);         /* #EAF2FE */
  --color-gender-female:          var(--color-atomic-pink-60);         /* #FA73E3 */
  --color-gender-female-surface:  var(--color-atomic-pink-96);         /* #FEECFB */
}

/* ─────────────────────────────────────────────────────────
   몽냥 Dark Mode Token Overrides
   ───────────────────────────────────────────────────────── */
[data-theme="dark"] {
  /* Brand */
  --color-brand-primary:          var(--color-atomic-coral-60);
  --color-brand-subtle:          var(--color-atomic-coral-5);
  --color-brand-accent:         var(--color-atomic-coral-80);

  /* Text */
  --color-text-strong:            #E4E4E7;                             /* Zinc-200 */
  --color-text-default:           #D4D4D8;                             /* Zinc-300 */
  --color-text-subtle:            var(--color-atomic-neutral-70);      /* #9B9B9B */
  --color-text-placeholder:       #52525B;                             /* Zinc-600 */
  --color-text-disabled:          #3F3F46;                             /* Zinc-700 */

  /* Icon */
  --color-icon-default:           #71717A;                             /* Zinc-500 */

  /* Background */
  --color-bg-default:             #18181B;                             /* Zinc-900 */
  --color-bg-subtle:              #27272A;                             /* Zinc-800 */
  --color-bg-muted:               #27272A;                             /* Zinc-800 */
  --color-surface-default:        #3F3F46;                             /* Zinc-700 */
  --color-surface-track:          #3F3F46;                             /* Zinc-700 */

  /* Border */
  --color-border-default:         #3F3F46;                             /* Zinc-700 */
  --color-border-subtle:          #3F3F46;                             /* Zinc-700 */
  --color-border-strong:          #3F3F46;                             /* Zinc-700 */

  /* Status */
  --color-status-info:            var(--color-atomic-blue-70);         /* #69A5FF */
  --color-status-error:           var(--color-atomic-red-60);          /* #FF6363 */
  --color-status-success:         var(--color-atomic-green-50);        /* #00BF40 */
  --color-status-warning:         var(--color-atomic-orange-60);       /* #FFA938 */

  /* Social */
  --color-social-kakao:           #FEE500;
  --color-social-naver:           #03C75A;
  --color-social-google:          var(--color-atomic-common-100);      /* #FFFFFF */
  --color-social-apple:           var(--color-atomic-common-0);        /* #000000 */

  /* Gender */
  --color-gender-male:            var(--color-atomic-blue-70);         /* #69A5FF */
  --color-gender-male-surface:    var(--color-atomic-cyan-5);          /* #00252B */
  --color-gender-female:          var(--color-atomic-pink-60);         /* #FA73E3 */
  --color-gender-female-surface:  var(--color-atomic-pink-5);          /* #3D0133 */
}

/* ─────────────────────────────────────────────────────────
   SEMANTIC TYPE CLASSES — apply directly with class="ds-title-1" etc.
   ───────────────────────────────────────────────────────── */
.ds-display-1 { font: var(--display-1-weight) var(--display-1-size)/var(--display-1-lh) var(--font-sans); letter-spacing: var(--display-1-tracking); }
.ds-display-2 { font: var(--display-2-weight) var(--display-2-size)/var(--display-2-lh) var(--font-sans); letter-spacing: var(--display-2-tracking); }
.ds-display-3 { font: var(--display-3-weight) var(--display-3-size)/var(--display-3-lh) var(--font-sans); letter-spacing: var(--display-3-tracking); }
.ds-title-1   { font: var(--title-1-weight)   var(--title-1-size)/var(--title-1-lh)     var(--font-sans); letter-spacing: var(--title-1-tracking); }
.ds-title-2   { font: var(--title-2-weight)   var(--title-2-size)/var(--title-2-lh)     var(--font-sans); letter-spacing: var(--title-2-tracking); }
.ds-title-3   { font: var(--title-3-weight)   var(--title-3-size)/var(--title-3-lh)     var(--font-sans); letter-spacing: var(--title-3-tracking); }
.ds-heading-1 { font: var(--heading-1-weight) var(--heading-1-size)/var(--heading-1-lh) var(--font-sans); letter-spacing: var(--heading-1-tracking); }
.ds-heading-2 { font: var(--heading-2-weight) var(--heading-2-size)/var(--heading-2-lh) var(--font-sans); letter-spacing: var(--heading-2-tracking); }
.ds-body-1, .ds-body-1-normal { font: var(--body-1-weight) var(--body-1-size)/var(--body-1-normal-lh) var(--font-sans); letter-spacing: var(--body-1-tracking); }

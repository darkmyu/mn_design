<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>몽냥 — 디자인 시안</title>
<style>
/* ============================================================
   Wanted Design System — Foundation tokens
   Source: Wanted Design System Figma file (CC BY 4.0 community)
   Two-layer model:
     - Atomic palette (raw hues + neutrals + opacity scale)
     - Semantic tokens (label / background / line / interaction / status / accent)
   Typography: Pretendard JP — a Korean / English / Japanese sans family.
   ============================================================ */

/* ---- Webfonts ---------------------------------------------- */
/* Pretendard Variable is shipped locally with the design system
   (fonts/PretendardVariable.ttf). This is the standard subset —
   it covers Korean + Latin glyphs at every weight 100–900.
   The original Wanted brand uses "Pretendard JP" (same family,
   adds Japanese glyphs); load it from CDN if you need JP copy.
   Wanted Sans (display) is the secondary face for the wordmark. */
@font-face {
  font-family: "Pretendard Variable";
  src: url("./fonts/PretendardVariable.ttf") format("truetype-variations"),
       url("./fonts/PretendardVariable.ttf") format("truetype");
  font-weight: 100 900;
  font-style: normal;
  font-display: swap;
}
/* Optional: Pretendard JP (CDN) — adds Japanese glyph coverage */
@import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-jp.css");
@import url("https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@v1.0.4/packages/wanted-sans/fonts/webfonts/variable/complete/WantedSansVariable.min.css");

:root {
  /* ─────────────────────────────────────────────────────────
     ATOMIC — raw palette. 13 hues, each with steps 99→0
     plus a common pair and a neutral scale.
     Names mirror Figma tokens exactly: color-atomic-{hue}-{step}.
     ───────────────────────────────────────────────────────── */

  /* common — pure black/white */
  --color-atomic-common-50:  #ffffff;
  --color-atomic-common-900: #000000;

  /* neutral */
  --color-atomic-neutral-50:  #F7F7F7;
  --color-atomic-neutral-100: #DCDCDC;
  --color-atomic-neutral-200: #C4C4C4;
  --color-atomic-neutral-300: #B0B0B0;
  --color-atomic-neutral-400: #9B9B9B;
  --color-atomic-neutral-500: #737373;
  --color-atomic-neutral-600: #5C5C5C;
  --color-atomic-neutral-700: #474747;
  --color-atomic-neutral-800: #2A2A2A;
  --color-atomic-neutral-900: #171717;

  /* slate — blue-tinted gray */
  --color-atomic-slate-50:  #F8FAFC;
  --color-atomic-slate-100: #F1F5F9;
  --color-atomic-slate-200: #E2E8F0;
  --color-atomic-slate-300: #CBD5E1;
  --color-atomic-slate-400: #94A3B8;
  --color-atomic-slate-500: #64748B;
  --color-atomic-slate-600: #475569;
  --color-atomic-slate-700: #334155;
  --color-atomic-slate-800: #1E293B;
  --color-atomic-slate-900: #0F172A;

  /* gray — true neutral gray */
  --color-atomic-gray-50:  #F9FAFB;
  --color-atomic-gray-100: #F3F4F6;
  --color-atomic-gray-200: #E5E7EB;
  --color-atomic-gray-300: #D1D5DB;
  --color-atomic-gray-400: #9CA3AF;
  --color-atomic-gray-500: #6B7280;
  --color-atomic-gray-600: #4B5563;
  --color-atomic-gray-700: #374151;
  --color-atomic-gray-800: #1F2937;
  --color-atomic-gray-900: #111827;

  /* zinc — cool neutral gray */
  --color-atomic-zinc-50:  #FAFAFA;
  --color-atomic-zinc-100: #F4F4F5;
  --color-atomic-zinc-200: #E4E4E7;
  --color-atomic-zinc-300: #D4D4D8;
  --color-atomic-zinc-400: #A1A1AA;
  --color-atomic-zinc-500: #71717A;
  --color-atomic-zinc-600: #52525B;
  --color-atomic-zinc-700: #3F3F46;
  --color-atomic-zinc-800: #27272A;
  --color-atomic-zinc-900: #18181B;

  /* red — destructive / error */
  --color-atomic-red-50:  #FFFAFA;
  --color-atomic-red-100: #FEECEC;
  --color-atomic-red-200: #FED5D5;
  --color-atomic-red-300: #FFB5B5;
  --color-atomic-red-400: #FF8C8C;
  --color-atomic-red-500: #FF6363;
  --color-atomic-red-600: #FF4242;
  --color-atomic-red-700: #E52222;
  --color-atomic-red-800: #B20C0C;
  --color-atomic-red-900: #3B0101;

  /* rose */
  --color-atomic-rose-50:  #FFF5F6;
  --color-atomic-rose-100: #FFE4E6;
  --color-atomic-rose-200: #FECDD3;
  --color-atomic-rose-300: #FDA4AF;
  --color-atomic-rose-400: #FB7185;
  --color-atomic-rose-500: #F43F5E;
  --color-atomic-rose-600: #E11D48;
  --color-atomic-rose-700: #BE123C;
  --color-atomic-rose-800: #9F1239;
  --color-atomic-rose-900: #7B1133;

  /* coral */
  --color-atomic-coral-50:  #FFFAF7;
  --color-atomic-coral-100: #FEEEE5;
  --color-atomic-coral-200: #FEDBC6;
  --color-atomic-coral-300: #FFC09C;
  --color-atomic-coral-400: #FF9C63;
  --color-atomic-coral-500: #FF7B2E;
  --color-atomic-coral-600: #FF5E00;
  --color-atomic-coral-700: #CC4B00;
  --color-atomic-coral-800: #943600;
  --color-atomic-coral-900: #2E1100;

  /* orange — warning */
  --color-atomic-orange-50:  #FFFCF7;
  --color-atomic-orange-100: #FEF4E6;
  --color-atomic-orange-200: #FEE6C6;
  --color-atomic-orange-300: #FFD49C;
  --color-atomic-orange-400: #FFC06E;
  --color-atomic-orange-500: #FFA938;
  --color-atomic-orange-600: #FF9200;
  --color-atomic-orange-700: #D17600;
  --color-atomic-orange-800: #9C5800;
  --color-atomic-orange-900: #361E00;

  /* yellow */
  --color-atomic-yellow-50:  #FEFEF3;
  --color-atomic-yellow-100: #FEF9C3;
  --color-atomic-yellow-200: #FEF08A;
  --color-atomic-yellow-300: #FDE047;
  --color-atomic-yellow-400: #FACC15;
  --color-atomic-yellow-500: #EAB308;
  --color-atomic-yellow-600: #CA8A04;
  --color-atomic-yellow-700: #A16207;
  --color-atomic-yellow-800: #854D0E;
  --color-atomic-yellow-900: #60360F;

  /* lime — fresh accent */
  --color-atomic-lime-50:  #F8FFF2;
  --color-atomic-lime-100: #E6FFD4;
  --color-atomic-lime-200: #CCFCA9;
  --color-atomic-lime-300: #AEF779;
  --color-atomic-lime-400: #88F03E;
  --color-atomic-lime-500: #6BE016;
  --color-atomic-lime-600: #58CF04;
  --color-atomic-lime-700: #48AD00;
  --color-atomic-lime-800: #347D00;
  --color-atomic-lime-900: #112900;

  /* green — success / positive */
  --color-atomic-green-50:  #F2FFF6;
  --color-atomic-green-100: #D9FFE6;
  --color-atomic-green-200: #ACFCC7;
  --color-atomic-green-300: #7DF5A5;
  --color-atomic-green-400: #49E57D;
  --color-atomic-green-500: #1ED45A;
  --color-atomic-green-600: #00BF40;
  --color-atomic-green-700: #009632;
  --color-atomic-green-800: #006E25;
  --color-atomic-green-900: #00240C;

  /* cyan */
  --color-atomic-cyan-50:  #F7FEFF;
  --color-atomic-cyan-100: #DEFAFF;
  --color-atomic-cyan-200: #B5F4FF;
  --color-atomic-cyan-300: #8AEDFF;
  --color-atomic-cyan-400: #57DFF7;
  --color-atomic-cyan-500: #28D0ED;
  --color-atomic-cyan-600: #00BDDE;
  --color-atomic-cyan-700: #0098B2;
  --color-atomic-cyan-800: #006F82;
  --color-atomic-cyan-900: #00252B;

  /* blue — primary brand color */
  --color-atomic-blue-50:  #F7FBFF;
  --color-atomic-blue-100: #EAF2FE;
  --color-atomic-blue-200: #C9DEFE;
  --color-atomic-blue-300: #9EC5FF;
  --color-atomic-blue-400: #69A5FF;
  --color-atomic-blue-500: #1A75FF;
  --color-atomic-blue-600: #0066FF;
  --color-atomic-blue-700: #0054D1;
  --color-atomic-blue-800: #003E9C;
  --color-atomic-blue-900: #001536;

  /* violet — secondary brand accent */
  --color-atomic-violet-50:  #FBFAFF;
  --color-atomic-violet-100: #F0ECFE;
  --color-atomic-violet-200: #DBD3FE;
  --color-atomic-violet-300: #C0B0FF;
  --color-atomic-violet-400: #9E86FC;
  --color-atomic-violet-500: #7D5EF7;
  --color-atomic-violet-600: #6541F2;
  --color-atomic-violet-700: #4F29E5;
  --color-atomic-violet-800: #23098F;
  --color-atomic-violet-900: #11024D;

  /* purple */
  --color-atomic-purple-50:  #FEFBFF;
  --color-atomic-purple-100: #F9EDFF;
  --color-atomic-purple-200: #F2D6FF;
  --color-atomic-purple-300: #E9BAFF;
  --color-atomic-purple-400: #DE96FF;
  --color-atomic-purple-500: #D478FF;
  --color-atomic-purple-600: #CB59FF;
  --color-atomic-purple-700: #AD36E3;
  --color-atomic-purple-800: #861CB8;
  --color-atomic-purple-900: #290247;

  /* pink */
  --color-atomic-pink-50:  #FFFAFE;
  --color-atomic-pink-100: #FEECFB;
  --color-atomic-pink-200: #FED3F7;
  --color-atomic-pink-300: #FFB8F3;
  --color-atomic-pink-400: #FF94ED;
  --color-atomic-pink-500: #FA73E3;
  --color-atomic-pink-600: #F553DA;
  --color-atomic-pink-700: #D331B8;
  --color-atomic-pink-800: #A81690;
  --color-atomic-pink-900: #3D0133;

  /* ─────────────────────────────────────────────────────────
     RADII, SPACING, SHADOWS
     ───────────────────────────────────────────────────────── */
  --radius-2:  2px;
  --radius-4:  4px;
  --radius-6:  6px;
  --radius-8:  8px;
  --radius-10: 10px;
  --radius-12: 12px;
  --radius-16: 16px;   /* small cards, pill buttons */
  --radius-20: 20px;
  --radius-24: 24px;   /* default card */
  --radius-32: 32px;   /* large container */
  --radius-64: 64px;   /* hero / section */
  --radius-pill: 999px;

  /* spacing — multiples of 4, with named anchors */
  --space-2:  2px;
  --space-4:  4px;
  --space-6:  6px;
  --space-8:  8px;
  --space-12: 12px;
  --space-16: 16px;
  --space-20: 20px;
  --space-24: 24px;
  --space-32: 32px;
  --space-48: 48px;
  --space-64: 64px;
  --space-96: 96px;
  --space-128: 128px;

  /* shadow system — used on elevated cards, popovers, toasts */
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06), 0 1px 1px rgba(0, 0, 0, 0.04);
  --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.08), 0 1px 2px rgba(0, 0, 0, 0.06);
  --shadow-lg: 0 4px 16px rgba(23, 23, 23, 0.07), 0 2px 4px rgba(23, 23, 23, 0.06);
  --shadow-xl: 0 8px 32px rgba(23, 23, 23, 0.10), 0 4px 8px rgba(23, 23, 23, 0.07);
  --shadow-focus-ring: 0 0 0 4px rgba(0, 102, 255, 0.16);

  /* ─────────────────────────────────────────────────────────
     TYPOGRAPHY — Pretendard JP, 16-step type scale.
     Tokens named Display / Title / Heading / Body / Label / Caption.
     Letter-spacing values come from the Figma source; they tighten
     as type grows. Body uses positive tracking for readability.
     ───────────────────────────────────────────────────────── */
  --font-sans: "Pretendard Variable", "Pretendard JP", "Pretendard", -apple-system, BlinkMacSystemFont,
               system-ui, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
  --font-display: "Wanted Sans Variable", "Pretendard Variable", "Pretendard JP", var(--font-sans);
  --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;

  /* Display — used for hero numbers, splash titles */
  --display-1-size: 56px;  --display-1-lh: 1.250; --display-1-tracking: -0.0166em; --display-1-weight: 700;
  --display-2-size: 40px;  --display-2-lh: 1.300; --display-2-tracking: -0.0282em; --display-2-weight: 700;
  --display-3-size: 32px;  --display-3-lh: 1.300; --display-3-tracking: -0.0263em; --display-3-weight: 700;

  /* Title — section/article titles */
  --title-1-size: 32px;    --title-1-lh: 1.375; --title-1-tracking: -0.0253em; --title-1-weight: 700;
  --title-2-size: 28px;    --title-2-lh: 1.358; --title-2-tracking: -0.0236em; --title-2-weight: 700;
  --title-3-size: 24px;    --title-3-lh: 1.334; --title-3-tracking: -0.0226em; --title-3-weight: 700;

  /* Heading — block-level headings, lists, cards */
  --heading-1-size: 22px;  --heading-1-lh: 1.364; --heading-1-tracking: -0.0194em; --heading-1-weight: 700;
  --heading-2-size: 20px;  --heading-2-lh: 1.400; --heading-2-tracking: -0.0120em; --heading-2-weight: 600;

  /* Body — paragraph text. Two density variants per size:
     ".normal" for dense UI rows / ".reading" for long-form prose */
  --body-1-size: 16px;     --body-1-normal-lh: 1.500;  --body-1-reading-lh: 1.625; --body-1-tracking: 0.0057em; --body-1-weight: 500;
  --body-2-size: 15px;     --body-2-normal-lh: 1.467;  --body-2-reading-lh: 1.600; --body-2-tracking: 0.0096em; --body-2-weight: 500;

  /* Label — buttons, form labels, captions in cards */
  --label-1-size: 14px;    --label-1-normal-lh: 1.429; --label-1-reading-lh: 1.571; --label-1-tracking: 0.0145em; --label-1-weight: 500;
  --label-2-size: 13px;    --label-2-lh: 1.385; --label-2-tracking: 0.0194em; --label-2-weight: 500;

  /* Caption — fine print, timestamps */
  --caption-1-size: 12px;  --caption-1-lh: 1.334; --caption-1-tracking: 0.0252em; --caption-1-weight: 500;
  --caption-2-size: 11px;  --caption-2-lh: 1.273; --caption-2-tracking: 0.0311em; --caption-2-weight: 500;
}

/* ─────────────────────────────────────────────────────────
   몽냥 Design Tokens — 실제 디자인 화면에서 사용하는 색상
   ───────────────────────────────────────────────────────── */
:root {
  /* Brand */
  --color-brand-default:          var(--color-atomic-coral-500);
  --color-brand-subtle:          var(--color-atomic-coral-100);
  --color-brand-strong:         var(--color-atomic-coral-800);

  /* Text */
  --color-text-strong:            var(--color-atomic-common-900);
  --color-text-default:           var(--color-atomic-zinc-800);
  --color-text-subtle:            var(--color-atomic-neutral-400);
  --color-text-placeholder:       var(--color-atomic-zinc-300);
  --color-text-disabled:          var(--color-atomic-zinc-200);

  /* Background */
  --color-bg-default:             var(--color-atomic-common-50);
  --color-bg-subtle:               var(--color-atomic-zinc-100);
  --color-surface-track:          var(--color-atomic-zinc-300);

  /* Border */
  --color-border-default:         var(--color-atomic-zinc-200);
  --color-border-subtle:          var(--color-atomic-zinc-100);
  --color-border-strong:          var(--color-atomic-zinc-300);

  /* Status */
  --color-status-info:            var(--color-atomic-blue-600);         /* #0066FF */
  --color-status-error:           var(--color-atomic-red-600);          /* #FF4242 */
  --color-status-success:         var(--color-atomic-green-600);        /* #00BF40 */
  --color-status-warning:         var(--color-atomic-orange-500);       /* #FFA938 */

  /* Social */
  --color-social-kakao:           #FEE500;
  --color-social-naver:           #03C75A;
  --color-social-google:          var(--color-atomic-common-50);      /* #FFFFFF */
  --color-social-apple:           var(--color-atomic-common-900);        /* #000000 */

  /* Gender */
  --color-gender-male:            var(--color-atomic-blue-400);         /* #69A5FF */
  --color-gender-male-surface:    var(--color-atomic-blue-100);         /* #EAF2FE */
  --color-gender-female:          var(--color-atomic-pink-500);         /* #FA73E3 */
  --color-gender-female-surface:  var(--color-atomic-pink-100);         /* #FEECFB */
}

/* ─────────────────────────────────────────────────────────
   몽냥 Dark Mode Token Overrides
   ───────────────────────────────────────────────────────── */
[data-theme="dark"] {
  /* Brand */
  --color-brand-default:          var(--color-atomic-coral-500);
  --color-brand-subtle:          var(--color-atomic-coral-900);
  --color-brand-strong:         var(--color-atomic-coral-300);

  /* Text */
  --color-text-strong:            var(--color-atomic-zinc-200);
  --color-text-default:           var(--color-atomic-zinc-300);
  --color-text-subtle:            var(--color-atomic-neutral-400);
  --color-text-placeholder:       var(--color-atomic-zinc-600);
  --color-text-disabled:          var(--color-atomic-zinc-700);

  /* Background */
  --color-bg-default:             var(--color-atomic-zinc-900);
  --color-bg-subtle:               var(--color-atomic-zinc-800);
  --color-surface-track:          var(--color-atomic-zinc-700);

  /* Border */
  --color-border-default:         var(--color-atomic-zinc-600);
  --color-border-subtle:          var(--color-atomic-zinc-700);
  --color-border-strong:          var(--color-atomic-zinc-500);

  /* Status */
  --color-status-info:            var(--color-atomic-blue-400);         /* #69A5FF */
  --color-status-error:           var(--color-atomic-red-500);          /* #FF6363 */
  --color-status-success:         var(--color-atomic-green-600);        /* #00BF40 */
  --color-status-warning:         var(--color-atomic-orange-500);       /* #FFA938 */

  /* Social */
  --color-social-kakao:           #FEE500;
  --color-social-naver:           #03C75A;
  --color-social-google:          var(--color-atomic-common-50);      /* #FFFFFF */
  --color-social-apple:           var(--color-atomic-common-900);        /* #000000 */

  /* Gender */
  --color-gender-male:            var(--color-atomic-blue-400);         /* #69A5FF */
  --color-gender-male-surface:    var(--color-atomic-cyan-900);          /* #00252B */
  --color-gender-female:          var(--color-atomic-pink-500);         /* #FA73E3 */
  --color-gender-female-surface:  var(--color-atomic-pink-900);          /* #3D0133 */
}

/* ─────────────────────────────────────────────────────────
   SEMANTIC TYPE CLASSES — apply directly with class="ds-title-1" etc.
   ───────────────────────────────────────────────────────── */
.ds-display-1 { font: var(--display-1-weight) var(--display-1-size)/var(--display-1-lh) var(--font-sans); letter-spacing: var(--display-1-tracking); }
.ds-display-2 { font: var(--display-2-weight) var(--display-2-size)/var(--display-2-lh) var(--font-sans); letter-spacing: var(--display-2-tracking); }
.ds-display-3 { font: var(--display-3-weight) var(--display-3-size)/var(--display-3-lh) var(--font-sans); letter-spacing: var(--display-3-tracking); }
.ds-title-1   { font: var(--title-1-weight)   var(--title-1-size)/var(--title-1-lh)     var(--font-sans); letter-spacing: var(--title-1-tracking); }
.ds-title-2   { font: var(--title-2-weight)   var(--title-2-size)/var(--title-2-lh)     var(--font-sans); letter-spacing: var(--title-2-tracking); }
.ds-title-3   { font: var(--title-3-weight)   var(--title-3-size)/var(--title-3-lh)     var(--font-sans); letter-spacing: var(--title-3-tracking); }
.ds-heading-1 { font: var(--heading-1-weight) var(--heading-1-size)/var(--heading-1-lh) var(--font-sans); letter-spacing: var(--heading-1-tracking); }
.ds-heading-2 { font: var(--heading-2-weight) var(--heading-2-size)/var(--heading-2-lh) var(--font-sans); letter-spacing: var(--heading-2-tracking); }
.ds-body-1, .ds-body-1-normal { font: var(--body-1-weight) var(--body-1-size)/var(--body-1-normal-lh) var(--font-sans); letter-spacing: var(--body-1-tracking); }
.ds-body-1-reading { font: var(--body-1-weight) var(--body-1-size)/var(--body-1-reading-lh) var(--font-sans); letter-spacing: var(--body-1-tracking); }
.ds-body-2, .ds-body-2-normal { font: var(--body-2-weight) var(--body-2-size)/var(--body-2-normal-lh) var(--font-sans); letter-spacing: var(--body-2-tracking); }
.ds-body-2-reading { font: var(--body-2-weight) var(--body-2-size)/var(--body-2-reading-lh) var(--font-sans); letter-spacing: var(--body-2-tracking); }
.ds-label-1, .ds-label-1-normal { font: var(--label-1-weight) var(--label-1-size)/var(--label-1-normal-lh) var(--font-sans); letter-spacing: var(--label-1-tracking); }
.ds-label-1-reading { font: var(--label-1-weight) var(--label-1-size)/var(--label-1-reading-lh) var(--font-sans); letter-spacing: var(--label-1-tracking); }
.ds-label-2   { font: var(--label-2-weight)   var(--label-2-size)/var(--label-2-lh)     var(--font-sans); letter-spacing: var(--label-2-tracking); }
.ds-caption-1 { font: var(--caption-1-weight) var(--caption-1-size)/var(--caption-1-lh) var(--font-sans); letter-spacing: var(--caption-1-tracking); }
.ds-caption-2 { font: var(--caption-2-weight) var(--caption-2-size)/var(--caption-2-lh) var(--font-sans); letter-spacing: var(--caption-2-tracking); }

/* HTML-element defaults so unmarked content still tracks the system */
html, body { font-family: var(--font-sans); color: var(--color-text-default); -webkit-font-smoothing: antialiased; }
h1 { font: var(--title-1-weight) var(--title-1-size)/var(--title-1-lh) var(--font-sans); letter-spacing: var(--title-1-tracking); }
h2 { font: var(--title-2-weight) var(--title-2-size)/var(--title-2-lh) var(--font-sans); letter-spacing: var(--title-2-tracking); }
h3 { font: var(--title-3-weight) var(--title-3-size)/var(--title-3-lh) var(--font-sans); letter-spacing: var(--title-3-tracking); }
h4 { font: var(--heading-1-weight) var(--heading-1-size)/var(--heading-1-lh) var(--font-sans); letter-spacing: var(--heading-1-tracking); }
h5 { font: var(--heading-2-weight) var(--heading-2-size)/var(--heading-2-lh) var(--font-sans); letter-spacing: var(--heading-2-tracking); }
p  { font: var(--body-1-weight) var(--body-1-size)/var(--body-1-reading-lh) var(--font-sans); letter-spacing: var(--body-1-tracking); }
small { font: var(--caption-1-weight) var(--caption-1-size)/var(--caption-1-lh) var(--font-sans); letter-spacing: var(--caption-1-tracking); }
code, pre { font-family: var(--font-mono); }

</style>
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; color: var(--color-text-default); }
  body { font-family: var(--font-sans); }
  button { font-family: var(--font-sans); }

  /* Mobile screen frame — sits inside each DCArtboard */
  .ph {
    width: 100%; height: 100%;
    background: var(--color-bg-default);
    overflow: hidden;
    display: flex; flex-direction: column;
    position: relative;
  }
  .ph > * { min-height: 0; }
  /* hide scrollbars inside phones */
  .ph *::-webkit-scrollbar { display: none; }
  .ph * { scrollbar-width: none; }

  /* Pretendard adjustments */
  h1, h2, h3, h4, p { font-family: var(--font-sans); }

  /* Pin emoji rendering across platforms */
  .emoji, [class*="emoji"] { font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif; }
</style>
